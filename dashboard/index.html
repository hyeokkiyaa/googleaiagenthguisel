<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ContextGuard 보안 대시보드</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef2f7;
        color: #172033;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: #eef2f7;
      }

      main {
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }

      .header-left h1 {
        margin: 0 0 2px;
        font-size: 22px;
        font-weight: 780;
        letter-spacing: -0.3px;
      }

      .header-left p {
        margin: 0;
        font-size: 13px;
        color: #64748b;
      }

      .sync {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12.5px;
        color: #64748b;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        padding: 6px 12px;
      }

      .sync-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #94a3b8;
        flex-shrink: 0;
      }

      .sync-dot.live  { background: #22c55e; }
      .sync-dot.demo  { background: #3b82f6; }
      .sync-dot.error { background: #ef4444; }

      /* ── Metrics ── */
      .metrics {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 14px;
      }

      .metric {
        padding: 16px 18px;
        border: 1px solid #e2e8f0;
        border-top-width: 3px;
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 1px 3px rgba(23, 32, 51, 0.06);
      }

      .metric[data-metric="total"] { border-top-color: #3b82f6; }
      .metric[data-metric="block"] { border-top-color: #dc2626; }
      .metric[data-metric="warn"]  { border-top-color: #d97706; }
      .metric[data-metric="fp"]    { border-top-color: #7c3aed; }
      .metric[data-metric="fn"]    { border-top-color: #059669; }

      .metric-label {
        display: block;
        color: #64748b;
        font-size: 11.5px;
        font-weight: 650;
        margin-bottom: 10px;
        letter-spacing: 0.1px;
      }

      .metric-value {
        font-size: 30px;
        font-weight: 780;
        line-height: 1;
        letter-spacing: -0.5px;
      }

      /* ── Workspace ── */
      .workspace {
        display: grid;
        grid-template-columns: 400px 1fr;
        gap: 14px;
        min-height: 660px;
      }

      .panel {
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        background: #fff;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(23, 32, 51, 0.07);
      }

      /* ── Incident list ── */
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 13px 16px;
        border-bottom: 1px solid #f1f5f9;
        background: #fafbfd;
      }

      .panel-header h2 {
        margin: 0;
        font-size: 13px;
        font-weight: 720;
        color: #1e293b;
      }

      .panel-count {
        font-size: 11.5px;
        color: #64748b;
        background: #f1f5f9;
        padding: 2px 9px;
        border-radius: 10px;
        font-weight: 650;
      }

      .incident-list {
        max-height: 594px;
        overflow: auto;
      }

      .incident-button {
        display: grid;
        gap: 6px;
        width: 100%;
        border: 0;
        border-bottom: 1px solid #f8fafc;
        background: #fff;
        color: inherit;
        cursor: pointer;
        padding: 13px 16px;
        text-align: left;
        transition: background 0.12s;
        border-left: 3px solid transparent;
      }

      .incident-button:hover  { background: #f8fbff; }
      .incident-button.active { background: #eff6ff; border-left-color: #3b82f6 !important; }

      .incident-button.risk-critical { border-left-color: #dc2626; }
      .incident-button.risk-high     { border-left-color: #ea580c; }
      .incident-button.risk-medium   { border-left-color: #d97706; }
      .incident-button.risk-low      { border-left-color: #22c55e; }

      .incident-title-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .incident-title {
        font-size: 13px;
        font-weight: 700;
        line-height: 1.35;
        flex: 1;
        color: #1e293b;
      }

      .incident-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 1px;
      }

      .incident-subtitle {
        color: #94a3b8;
        font-size: 11.5px;
        flex: 1;
      }

      .risk-badge {
        font-size: 10.5px;
        font-weight: 700;
        border-radius: 4px;
        padding: 1px 6px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .risk-badge.critical { background: #fee2e2; color: #991b1b; }
      .risk-badge.high     { background: #ffedd5; color: #9a3412; }
      .risk-badge.medium   { background: #fef9c3; color: #854d0e; }
      .risk-badge.low      { background: #dcfce7; color: #166534; }

      /* ── Decision badges ── */
      .decision {
        border-radius: 5px;
        padding: 3px 9px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.4px;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .decision-block { background: #fee2e2; color: #991b1b; }
      .decision-warn  { background: #fef3c7; color: #92400e; }
      .decision-pass  { background: #dcfce7; color: #166534; }

      /* ── Detail panel ── */
      .detail {
        display: grid;
        grid-template-rows: auto auto 1fr;
        min-height: 100%;
      }

      .detail-main {
        padding: 22px 24px 18px;
        border-bottom: 1px solid #f1f5f9;
      }

      .detail-main h2 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 760;
        letter-spacing: -0.2px;
        color: #0f172a;
      }

      .detail-main p {
        margin: 0;
        color: #475569;
        font-size: 13px;
        line-height: 1.65;
      }

      .comparison {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        border-bottom: 1px solid #f1f5f9;
      }

      .comparison > div {
        padding: 15px 20px;
        border-right: 1px solid #f1f5f9;
      }

      .comparison > div:last-child { border-right: 0; }

      .section-label {
        margin-bottom: 8px;
        color: #94a3b8;
        font-size: 10.5px;
        font-weight: 720;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      .productivity-text {
        font-size: 13px;
        font-weight: 700;
        color: #1e293b;
        line-height: 1.4;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .detail-section {
        min-height: 240px;
        padding: 18px 20px;
        border-right: 1px solid #f1f5f9;
      }

      .detail-section:last-child { border-right: 0; }

      /* Evidence list */
      .evidence-list {
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .evidence-list li {
        display: inline-flex;
        align-items: center;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-left: 3px solid #cbd5e1;
        border-radius: 5px;
        padding: 4px 10px;
        font-size: 12px;
        color: #334155;
        font-family: ui-monospace, "SFMono-Regular", monospace;
      }

      .evidence-empty {
        font-size: 12px;
        color: #94a3b8;
        margin-top: 10px;
      }

      code {
        display: block;
        margin-top: 14px;
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 8px;
        background: #f8fafc;
        color: #334155;
        padding: 12px 14px;
        font-size: 12px;
        line-height: 1.65;
        border: 1px solid #e2e8f0;
      }

      /* Timeline */
      .timeline-list {
        margin: 10px 0 0;
        padding-left: 20px;
        color: #475569;
        font-size: 13px;
        line-height: 2;
      }

      .timeline-list li::marker {
        color: #94a3b8;
        font-weight: 600;
      }

      .empty {
        padding: 48px 20px;
        color: #94a3b8;
        font-size: 13px;
        text-align: center;
      }

      @media (max-width: 900px) {
        .metrics,
        .workspace,
        .comparison,
        .detail-grid {
          grid-template-columns: 1fr;
        }

        .detail-section,
        .comparison > div {
          border-right: 0;
          border-bottom: 1px solid #f1f5f9;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="header-left">
          <h1>ContextGuard 보안 대시보드</h1>
          <p>AI 기반 데이터 유출 방지 · 실시간 인시던트 모니터링</p>
        </div>
        <div class="sync">
          <span class="sync-dot" id="sync-dot"></span>
          <span id="last-sync">연결 중...</span>
        </div>
      </header>

      <section class="metrics" aria-label="보안 지표">
        <div class="metric" data-metric="total">
          <span class="metric-label">전체 인시던트</span>
          <strong class="metric-value" id="metric-total">0</strong>
        </div>
        <div class="metric" data-metric="block">
          <span class="metric-label">차단됨</span>
          <strong class="metric-value" id="metric-block">0</strong>
        </div>
        <div class="metric" data-metric="warn">
          <span class="metric-label">경고</span>
          <strong class="metric-value" id="metric-warn">0</strong>
        </div>
        <div class="metric" data-metric="fp">
          <span class="metric-label">오탐 감소</span>
          <strong class="metric-value" id="metric-fp">0</strong>
        </div>
        <div class="metric" data-metric="fn">
          <span class="metric-label">미탐 방지</span>
          <strong class="metric-value" id="metric-fn">0</strong>
        </div>
      </section>

      <div class="workspace">
        <section class="panel">
          <div class="panel-header">
            <h2>인시던트 타임라인</h2>
            <span class="panel-count" id="incident-count">0건</span>
          </div>
          <div class="incident-list" id="incident-list"></div>
        </section>

        <section class="panel detail" id="incident-detail">
          <div class="detail-main">
            <h2 id="detail-title">인시던트를 선택하세요</h2>
            <p id="detail-summary">왼쪽 타임라인에서 인시던트를 클릭하면 상세 내용을 확인할 수 있습니다.</p>
          </div>

          <div class="comparison" id="rule-ai-comparison">
            <div>
              <div class="section-label">규칙 결과</div>
              <span class="decision decision-pass" id="detail-rule">PASS</span>
            </div>
            <div>
              <div class="section-label">AI 결과</div>
              <span class="decision decision-pass" id="detail-ai">PASS</span>
            </div>
            <div id="productivity-impact">
              <div class="section-label">생산성 영향</div>
              <strong class="productivity-text" id="detail-impact">변화 없음</strong>
            </div>
          </div>

          <div class="detail-grid">
            <div class="detail-section">
              <div class="section-label">탐지 근거</div>
              <ul class="evidence-list" id="detail-evidence"></ul>
              <code id="detail-sample"></code>
            </div>
            <div class="detail-section" id="incident-timeline">
              <div class="section-label">처리 흐름</div>
              <ol class="timeline-list" id="detail-timeline"></ol>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="./dashboard_core.js"></script>
    <script>
      const ApiBase = "http://127.0.0.1:8765";
      let selectedIncidentId = null;
      let pollInterval = null;
      let usingMockData = false;

      const surfaceNames = {
        demo_upload: "데모 업로드",
        gmail: "Gmail",
        slack: "Slack",
        chatgpt: "ChatGPT",
        notion: "Notion",
        telegram: "Telegram",
        whatsapp_web: "WhatsApp",
        google_docs: "Google Docs",
        google_sheets: "Google Sheets",
      };

      const riskLabels = {
        critical: "위험",
        high: "높음",
        medium: "보통",
        low: "낮음",
      };

      function formatDate(iso) {
        if (!iso) return "";
        return new Date(iso).toLocaleString("ko-KR", {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function setSyncStatus(mode, text) {
        document.getElementById("sync-dot").className = `sync-dot ${mode}`;
        document.getElementById("last-sync").textContent = text;
      }

      async function loadMockData() {
        const res = await fetch("./mock_data.json");
        const data = await res.json();
        return { metrics: data.metrics, incidents: data.incidents };
      }

      async function loadDashboard() {
        try {
          const ctrl = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 2000);
          const [mRes, iRes] = await Promise.all([
            fetch(`${ApiBase}/metrics`, { signal: ctrl.signal }),
            fetch(`${ApiBase}/incidents`, { signal: ctrl.signal }),
          ]);
          clearTimeout(timer);
          const metrics = await mRes.json();
          const { incidents } = await iRes.json();
          usingMockData = false;
          renderMetrics(metrics);
          renderIncidentList(incidents);
          renderIncidentDetail(incidents.find((i) => i.id === selectedIncidentId) || incidents[0]);
          setSyncStatus("live", `마지막 동기화 ${new Date().toLocaleTimeString("ko-KR")}`);
        } catch {
          if (!usingMockData) {
            try {
              const { metrics, incidents } = await loadMockData();
              usingMockData = true;
              renderMetrics(metrics);
              renderIncidentList(incidents);
              renderIncidentDetail(incidents.find((i) => i.id === selectedIncidentId) || incidents[0]);
              setSyncStatus("demo", "데모 모드 · 샘플 데이터");
              clearInterval(pollInterval);
              pollInterval = null;
            } catch {
              setSyncStatus("error", "에이전트 오프라인");
            }
          }
        }
      }

      function renderMetrics(metrics) {
        document.getElementById("metric-total").textContent = metrics.total || 0;
        document.getElementById("metric-block").textContent = metrics.block || 0;
        document.getElementById("metric-warn").textContent = metrics.warn || 0;
        document.getElementById("metric-fp").textContent = metrics.prevented_false_positive || 0;
        document.getElementById("metric-fn").textContent = metrics.prevented_false_negative || 0;
      }

      function renderIncidentList(incidents) {
        const list = document.getElementById("incident-list");
        document.getElementById("incident-count").textContent = `${incidents.length}건`;

        if (!incidents.length) {
          list.innerHTML = '<div class="empty">인시던트가 없습니다.</div>';
          return;
        }

        list.innerHTML = incidents.map((incident) => {
          const summary = ContextGuardDashboard.summarizeIncident(incident);
          const active = summary.id === selectedIncidentId ? " active" : "";
          const riskClass = incident.risk_level ? ` risk-${incident.risk_level}` : "";
          const surfaceLabel = surfaceNames[incident.surface] || incident.surface || "";
          const riskLabel = riskLabels[incident.risk_level] || "";

          return `
            <button class="incident-button${active}${riskClass}" type="button" data-incident-id="${summary.id}">
              <div class="incident-title-row">
                <span class="incident-title">${summary.title}</span>
                <span class="decision ${summary.decisionClassName}">${summary.decision}</span>
              </div>
              <div class="incident-meta">
                <span class="incident-subtitle">${surfaceLabel} · ${formatDate(incident.created_at)}</span>
                ${riskLabel ? `<span class="risk-badge ${incident.risk_level}">${riskLabel}</span>` : ""}
              </div>
            </button>
          `;
        }).join("");

        list.querySelectorAll("[data-incident-id]").forEach((btn) => {
          btn.addEventListener("click", () => {
            selectedIncidentId = btn.dataset.incidentId;
            loadDashboard();
          });
        });
      }

      function renderIncidentDetail(incident) {
        if (!incident) return;
        selectedIncidentId = incident.id;
        document.getElementById("detail-title").textContent = incident.title;
        document.getElementById("detail-summary").textContent = incident.summary;
        setDecision("detail-rule", incident.rule_decision);
        setDecision("detail-ai", incident.ai_decision);
        document.getElementById("detail-impact").textContent =
          ContextGuardDashboard.productivityLabel(incident.productivity_impact.impact_type);

        const evidenceEl = document.getElementById("detail-evidence");
        if (incident.evidence && incident.evidence.length) {
          evidenceEl.innerHTML = incident.evidence.map((e) => `<li>${e}</li>`).join("");
        } else {
          evidenceEl.innerHTML = "";
          evidenceEl.insertAdjacentHTML("afterend", "");
        }

        document.getElementById("detail-sample").textContent = incident.raw_sample_redacted || "";
        document.getElementById("detail-timeline").innerHTML = [
          `${incident.source} 이벤트 감지: ${incident.event_type}`,
          `규칙 판단: ${incident.rule_decision}`,
          `AI 판단: ${incident.ai_decision}`,
          `최종 결정: ${incident.decision}`,
        ].map((item) => `<li>${item}</li>`).join("");
      }

      function setDecision(id, decision) {
        const el = document.getElementById(id);
        el.textContent = decision;
        el.className = `decision ${ContextGuardDashboard.decisionClass(decision)}`;
      }

      loadDashboard();
      pollInterval = window.setInterval(loadDashboard, 2500);
    </script>
  </body>
</html>
