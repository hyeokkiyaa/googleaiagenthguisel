<!doctype html>
<html lang="ko" data-contextguard-surface="demo_upload">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ContextGuard External Upload Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(20, 184, 166, 0.10)),
          #f4f7fb;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 720;
        letter-spacing: 0;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid #bdd7d3;
        border-radius: 8px;
        background: #e7f7f3;
        color: #105f55;
        font-size: 13px;
        font-weight: 650;
      }

      .status::before {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #0f9f7a;
        content: "";
      }

      .workspace {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 18px;
        align-items: stretch;
      }

      aside,
      section {
        border: 1px solid #d7dee8;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 50px rgba(32, 48, 72, 0.08);
      }

      aside {
        padding: 16px;
      }

      .case-list {
        display: grid;
        gap: 10px;
      }

      button {
        width: 100%;
        min-height: 48px;
        border: 1px solid #c9d3e1;
        border-radius: 8px;
        background: #fff;
        color: #172033;
        cursor: pointer;
        font: inherit;
        text-align: left;
        padding: 10px 12px;
      }

      button:hover {
        border-color: #4f8bd8;
        background: #f6faff;
      }

      button strong {
        display: block;
        margin-bottom: 3px;
        font-size: 13px;
      }

      button span {
        color: #5b6678;
        font-size: 12px;
      }

      section {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 620px;
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid #d7dee8;
      }

      .target-label {
        font-size: 13px;
        color: #5b6678;
      }

      textarea {
        width: 100%;
        height: 100%;
        min-height: 430px;
        resize: none;
        border: 0;
        outline: none;
        padding: 18px;
        font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        color: #111827;
        background: #fbfdff;
      }

      .upload-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-top: 1px solid #d7dee8;
        background: #fff;
      }

      input[type="file"] {
        width: 100%;
        max-width: 420px;
        border: 1px solid #c9d3e1;
        border-radius: 8px;
        padding: 8px;
        background: #f8fafc;
      }

      @media (max-width: 760px) {
        header {
          align-items: start;
          flex-direction: column;
        }

        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>External Upload Demo</h1>
        <div class="status">Local Agent target: 127.0.0.1:8765</div>
      </header>

      <div class="workspace">
        <aside>
          <div class="case-list">
            <button type="button" data-sample="case-a">
              <strong>Case A</strong>
              <span>Resume text with own resident number</span>
            </button>
            <button type="button" data-sample="case-b">
              <strong>Case B</strong>
              <span>Sales lead list for external email</span>
            </button>
            <button type="button" data-sample="case-c">
              <strong>Case C</strong>
              <span>Internal code identifiers for ChatGPT</span>
            </button>
          </div>
        </aside>

        <section>
          <div class="toolbar">
            <div>
              <strong>Paste Target</strong>
              <div class="target-label">Chrome Extension watches this field</div>
            </div>
          </div>

          <textarea id="demo-paste-target" spellcheck="false" placeholder="Paste demo sample text here"></textarea>

          <div class="upload-row">
            <strong>File Upload Target</strong>
            <input id="demo-file-input" type="file">
          </div>
        </section>
      </div>
    </main>

    <script>
      const samples = {
        "case-a": "개인 이력서입니다. 본인 확인용 주민등록번호 950101-1234567을 적었습니다.",
        "case-b": [
          "김민준, Acme Korea, Sales Manager, minjun.kim@example.com, 010-1111-2222",
          "이지우, Beta Labs, CTO, jiwoo.lee@example.com, 010-3333-4444",
          "박서연, Cloud Nine, Buyer, seoyeon.park@example.com, 010-5555-6666",
          "최도윤, Delta Works, Procurement, doyoon.choi@example.com, 010-7777-8888"
        ].join("\n"),
        "case-c": "Debug TraceForgePolicyResolver and customerRiskScorerV2 in hf_internal_pricing_engine."
      };

      const target = document.getElementById("demo-paste-target");
      document.querySelectorAll("[data-sample]").forEach((button) => {
        button.addEventListener("click", async () => {
          await navigator.clipboard.writeText(samples[button.dataset.sample]);
          target.focus();
        });
      });
    </script>
  </body>
</html>
